<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g2" x1="100" y1="100" x2="412" y2="412" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="g3" x1="200" y1="128" x2="312" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#67e8f9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="16"/>
      <feOffset dx="0" dy="0"/>
      <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1"/>
      <feFlood flood-color="#818cf8" flood-opacity="0.4"/>
      <feComposite in2="SourceGraphic" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" stroke="url(#g1)" stroke-width="4"/>
  
  <!-- Outer Ring Orbit -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#g2)" stroke-width="2" opacity="0.3"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#g2)" stroke-width="1.5" opacity="0.15"/>
  
  <!-- Cross Lines  (compass / neural network) -->
  <g opacity="0.25" stroke="url(#g2)" stroke-width="1.5" stroke-linecap="round">
    <line x1="256" y1="80" x2="256" y2="432"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="124" y1="124" x2="388" y2="388"/>
    <line x1="388" y1="124" x2="124" y2="388"/>
  </g>
  
  <!-- Small orbit dots -->
  <circle cx="256" cy="56" r="6" fill="url(#g1)" filter="url(#glow)"/>
  <circle cx="456" cy="256" r="5" fill="#22d3ee" filter="url(#glow)"/>
  <circle cx="256" cy="456" r="5" fill="#a78bfa" filter="url(#glow)"/>
  <circle cx="56" cy="256" r="6" fill="url(#g1)" filter="url(#glow)"/>
  
  <!-- Central Brain / AI Core -->
  <g filter="url(#outerGlow)">
    <!-- Core circle -->
    <circle cx="256" cy="256" r="64" fill="none" stroke="url(#g1)" stroke-width="4"/>
    <circle cx="256" cy="256" r="32" fill="url(#g1)" opacity="0.9"/>
    <circle cx="256" cy="256" r="16" fill="#f0f4ff"/>
    
    <!-- Neural Connections / Rays -->
    <g stroke="url(#g3)" stroke-width="2.5" stroke-linecap="round">
      <!-- Top -->
      <line x1="256" y1="192" x2="256" y2="140"/>
      <circle cx="256" cy="136" r="8" fill="url(#g1)"/>
      <!-- Bottom -->
      <line x1="256" y1="320" x2="256" y2="372"/>
      <circle cx="256" cy="376" r="8" fill="url(#g1)"/>
      <!-- Left -->
      <line x1="192" y1="256" x2="140" y2="256"/>
      <circle cx="136" cy="256" r="8" fill="url(#g1)"/>
      <!-- Right -->
      <line x1="320" y1="256" x2="372" y2="256"/>
      <circle cx="376" cy="256" r="8" fill="url(#g1)"/>
      <!-- Diagonals -->
      <line x1="211" y1="211" x2="174" y2="174"/>
      <circle cx="170" cy="170" r="6" fill="#a78bfa"/>
      <line x1="301" y1="211" x2="338" y2="174"/>
      <circle cx="342" cy="170" r="6" fill="#22d3ee"/>
      <line x1="211" y1="301" x2="174" y2="338"/>
      <circle cx="170" cy="342" r="6" fill="#22d3ee"/>
      <line x1="301" y1="301" x2="338" y2="338"/>
      <circle cx="342" cy="342" r="6" fill="#a78bfa"/>
    </g>
  </g>
</svg>
